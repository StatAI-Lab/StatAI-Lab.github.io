<div class="qr-modal" id="{{ include.id }}" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center;">
  <div class="qr-modal-content" style="background:var(--background); padding:30px; border-radius:var(--rounded); box-shadow:var(--shadow); max-width:90%; text-align:center; position:relative;">
    <span class="qr-modal-close" onclick="document.getElementById('{{ include.id }}').style.display='none'" style="position:absolute; top:10px; right:15px; font-size:1.5rem; cursor:pointer; color:var(--text-muted);">&times;</span>
    <p style="margin:0 0 15px 0; font-weight:var(--semi-bold);">{{ include.title }}</p>
    <img src="{{ include.image | relative_url }}" alt="QR code" style="width:{{ include.width | default: '200px' }}; height:auto; border-radius:var(--rounded);">
  </div>
</div>

<script>
document.getElementById('{{ include.id }}').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});
</script>
