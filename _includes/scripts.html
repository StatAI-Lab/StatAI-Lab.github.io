<!-- third party scripts -->
<script src="https://unpkg.com/@popperjs/core@2" defer></script>
<script src="https://unpkg.com/tippy.js@6" defer></script>
<script src="https://unpkg.com/mark.js@8" defer></script>

<!-- include all js in scripts folder -->
{% assign scripts = site.static_files | where_exp: "file", "file.path contains '/_scripts'" %}
{% for script in scripts %}
  <script src="{{ script.path | relative_url }}"></script>
{% endfor %}

<!-- copy email to clipboard -->
<script>
  document.addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (!link) return;
    var href = link.getAttribute('href');
    if (!href || !href.startsWith('mailto:')) return;
    e.preventDefault();
    var email = href.slice(7);
    navigator.clipboard.writeText(email).then(function() {
      var notif = document.createElement('div');
      notif.textContent = 'Email copied: ' + email;
      notif.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#0795d9;color:#fff;padding:10px 16px;border-radius:4px;z-index:9999;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.2)';
      document.body.appendChild(notif);
      setTimeout(function() { notif.remove(); }, 2500);
    });
  });
</script>
