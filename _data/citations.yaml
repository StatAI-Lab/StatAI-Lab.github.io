# ================================================
# StatAI Lab 论文列表
# ================================================
# 手动填写，不需要 ORCID / SerpAPI 等自动工具
#
# 每篇论文格式：
# - id:        唯一标识（用 DOI 最方便，如 "doi:10.xxxx/xxxxx"，没有 DOI 就用任意字符串）
#   title:     论文标题（完整标题）
#   authors:   作者列表（用 - 开头的 YAML 列表格式）
#   publisher: 发表期刊/会议
#   date:      发表日期，格式 'YYYY-MM-DD'（或只写 'YYYY-MM'、'YYYY'）
#   link:      论文链接（DOI 链接如 https://doi.org/xxxx，或 Google Scholar 链接）
#   type:      paper（固定值）
# ================================================

# ---- Highlighted（代表作） ----
# 在 Publication 页面 Highlighted 区域显示的论文

# - id: doi:10.xxxx/xxxxx
#   title: "[会议/期刊 年份] 论文完整标题"
